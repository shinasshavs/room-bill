<!DOCTYPE html>
<html>
<head>
  <title>Energy App</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1e88e5">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(#1e88e5, #90caf9);
      color: white;
    }

    .top {
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .card {
      background: white;
      color: black;
      border-radius: 20px;
      margin: 15px;
      padding: 15px;
    }

    .total {
      font-size: 30px;
      font-weight: bold;
      color: green;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .mini-card {
      background: #f1f1f1;
      padding: 10px;
      border-radius: 12px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #1e88e5;
      color: white;
      margin-top: 10px;
    }

    #loginBox, #adminPanel {
      display: none;
    }
  </style>
</head>

<body>

<div class="top">⚡ Energy</div>

<div class="card">

  <div class="total">₹ <span id="total">0</span></div>
  <div>Units: <span id="units">0</span></div>

  <div class="grid">
    <div class="mini-card">📅 Bill: <span id="billDate"></span></div>
    <div class="mini-card">⏳ Days Left: <span id="daysLeft"></span></div>
  </div>

  <button onclick="openLogin()">🔒 Admin</button>

  <div id="loginBox">
    <input type="password" id="password" placeholder="Password">
    <button onclick="checkPassword()">Login</button>
  </div>

  <div id="adminPanel">
    <input type="number" id="prev" placeholder="Previous Reading">
    <input type="number" id="curr" placeholder="Current Reading">
    <button onclick="updateBill()">Update</button>
  </div>

</div>

<script>
const PASSWORD = "4007";

const firebaseConfig = {
  apiKey: "AIzaSyC-QCBrGFrGI7FPrmZjocmf4Mzu92TgiEs",
  authDomain: "room-electricity.firebaseapp.com",
  databaseURL: "https://room-electricity-default-rtdb.firebaseio.com",
  projectId: "room-electricity"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const unitsEl = document.getElementById("units");
const totalEl = document.getElementById("total");
const billDateEl = document.getElementById("billDate");
const daysLeftEl = document.getElementById("daysLeft");

// LOGIN
function openLogin(){
  document.getElementById("loginBox").style.display = "block";
}

function checkPassword(){
  if(document.getElementById("password").value === PASSWORD){
    document.getElementById("adminPanel").style.display = "block";
  } else {
    alert("Wrong Password ❌");
  }
}

// CALCULATION
function calculate(u){
  let e=0;
  let s1=Math.min(u,100); e+=s1*3.35; u-=s1;
  if(u>0){let s2=Math.min(u,100); e+=s2*4.25; u-=s2;}
  if(u>0){let s3=Math.min(u,100); e+=s3*5.35; u-=s3;}
  if(u>0){let s4=Math.min(u,100); e+=s4*7.2; u-=s4;}
  if(u>0){let s5=Math.min(u,100); e+=s5*8.5; u-=s5;}
  return e;
}

function fixed(u){
  if(u<=100)return 100;
  if(u<=200)return 170;
  if(u<=300)return 210;
  if(u<=400)return 280;
  if(u<=500)return 320;
  return 440;
}

// UPDATE
function updateBill(){
  let prev=parseFloat(document.getElementById("prev").value)||0;
  let curr=parseFloat(document.getElementById("curr").value)||0;

  let units=curr-prev;
  if(units<0) units=0;

  let energy=calculate(units);
  let total=energy+fixed(units)+(energy*0.1)+12;

  db.ref("bill").set({units,total});
}

// DISPLAY
db.ref("bill").on("value", snap=>{
  let d=snap.val();
  if(d){
    unitsEl.innerText=d.units;
    totalEl.innerText=d.total.toFixed(2);
  }
});

// DATE
const today = new Date();
const next = new Date("2026-06-07");
const days = Math.ceil((next - today)/(1000*60*60*24));

billDateEl.innerText = "07-04-2026";
daysLeftEl.innerText = days;

// SERVICE WORKER REGISTER
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
