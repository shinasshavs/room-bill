<!DOCTYPE html>
<html>
<head>
  <title>CED KSEB</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1e88e5">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(#1e88e5, #90caf9);
      color: white;
    }

    .top {
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .card {
      background: white;
      color: black;
      border-radius: 20px;
      margin: 15px;
      padding: 15px;
    }

    .total {
      font-size: 30px;
      font-weight: bold;
      color: green;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .mini-card {
      background: #f1f1f1;
      padding: 10px;
      border-radius: 12px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #1e88e5;
      color: white;
      margin-top: 10px;
    }

    #loginBox, #adminPanel, #historyBox {
      display: none;
    }

    .history-item {
      border-bottom: 1px solid #ccc;
      padding: 5px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="top">⚡ CED KSEB</div>

<div class="card">

  <div class="total">₹ <span id="total">0</span></div>
  <div>Units: <span id="units">0</span></div>

  <div class="grid">
    <div class="mini-card">📅 Bill: <span id="billDate"></span></div>
    <div class="mini-card">📅 Next: <span id="nextDate"></span></div>
    <div class="mini-card">⏳ Days: <span id="daysLeft"></span></div>
  </div>

  <button onclick="openLogin()">🔒 Admin</button>

  <div id="loginBox">
    <input type="password" id="password" placeholder="Password">
    <button onclick="checkPassword()">Login</button>
  </div>

  <div id="adminPanel">
    <input type="number" id="prev" placeholder="Previous Reading">
    <input type="number" id="curr" placeholder="Current Reading">
    <button onclick="updateBill()">Update</button>
  </div>

  <button onclick="toggleHistory()">📜 History</button>
  <div id="historyBox"></div>

  <button onclick="toggleGraph()">📊 Graph</button>
  <canvas id="chart" style="display:none;"></canvas>

</div>

<script>
const PASSWORD = "4007";

const firebaseConfig = {
  apiKey: "AIzaSyC-QCBrGFrGI7FPrmZjocmf4Mzu92TgiEs",
  authDomain: "room-electricity.firebaseapp.com",
  databaseURL: "https://room-electricity-default-rtdb.firebaseio.com",
  projectId: "room-electricity"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ELEMENTS
const unitsEl = document.getElementById("units");
const totalEl = document.getElementById("total");
const historyBox = document.getElementById("historyBox");
const chartCanvas = document.getElementById("chart");

// LOGIN
function openLogin(){
  document.getElementById("loginBox").style.display = "block";
}

function checkPassword(){
  if(document.getElementById("password").value === PASSWORD){
    document.getElementById("adminPanel").style.display = "block";
  }
}

// CALCULATION
function calculate(u){
  let e=0;
  let s1=Math.min(u,100); e+=s1*3.35; u-=s1;
  if(u>0){let s2=Math.min(u,100); e+=s2*4.25; u-=s2;}
  if(u>0){let s3=Math.min(u,100); e+=s3*5.35; u-=s3;}
  if(u>0){let s4=Math.min(u,100); e+=s4*7.2; u-=s4;}
  if(u>0){let s5=Math.min(u,100); e+=s5*8.5; u-=s5;}
  return e;
}

function fixed(u){
  if(u<=100)return 100;
  if(u<=200)return 170;
  if(u<=300)return 210;
  if(u<=400)return 280;
  if(u<=500)return 320;
  return 440;
}

// UPDATE + SAVE HISTORY
function updateBill(){
  let prev=parseFloat(document.getElementById("prev").value)||0;
  let curr=parseFloat(document.getElementById("curr").value)||0;

  let units=curr-prev;
  if(units<0) units=0;

  let energy=calculate(units);
  let total=energy+fixed(units)+(energy*0.1)+12;

  db.ref("bill").set({units,total});

  db.ref("history").push({
    prev,curr,units,
    date:new Date().toLocaleString()
  });
}

// DISPLAY BILL
db.ref("bill").on("value", snap=>{
  let d=snap.val();
  if(d){
    unitsEl.innerText=d.units;
    totalEl.innerText=d.total.toFixed(2);
  }
});

// HISTORY VIEW
function toggleHistory(){
  historyBox.style.display = (historyBox.style.display==="block")?"none":"block";
}

db.ref("history").on("value", snap=>{
  let data=snap.val();
  let html="";
  for(let k in data){
    let i=data[k];
    html+=`
    <div class="history-item">
      ${i.date}<br>
      ${i.prev} → ${i.curr} = ${i.units}
      <button onclick="editHistory('${k}')">✏️</button>
    </div>`;
  }
  historyBox.innerHTML=html;
});

// EDIT HISTORY
function editHistory(key){
  let newUnits=prompt("Enter corrected units:");
  if(newUnits){
    db.ref("history/"+key+"/units").set(parseFloat(newUnits));
  }
}

// GRAPH
let chart;
function toggleGraph(){
  chartCanvas.style.display = (chartCanvas.style.display==="block")?"none":"block";
}

db.ref("history").on("value", snap=>{
  let data=snap.val();
  if(!data) return;

  let labels=[], values=[];
  for(let k in data){
    labels.push(data[k].date);
    values.push(data[k].units);
  }

  const ctx=chartCanvas.getContext("2d");
  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"Units Usage",
        data:values,
        borderWidth:2
      }]
    }
  });
});

// DATE
const today=new Date();
const billDate="07-04-2026";
const nextDate="07-06-2026";

const next=new Date("2026-06-07");
const days=Math.ceil((next-today)/(1000*60*60*24));

document.getElementById("billDate").innerText=billDate;
document.getElementById("nextDate").innerText=nextDate;
document.getElementById("daysLeft").innerText=days;

// SERVICE WORKER
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
