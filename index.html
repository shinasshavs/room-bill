<!DOCTYPE html>
<html>
<head>
  <title>Room Electricity Bill</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      background: #007bff;
      color: white;
      margin-top: 10px;
      font-weight: bold;
    }

    .row {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      margin: 10px 0;
    }

    .total {
      font-size: 24px;
      font-weight: bold;
      color: green;
      text-align: center;
    }

    .admin-btn {
      text-align: right;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    #loginBox, #adminPanel {
      display: none;
      margin-top: 10px;
      background: #f1f1f1;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="admin-btn" onclick="openLogin()">🔒 Admin</div>

  <h2>⚡ Room Bill</h2>

  <!-- LOGIN BOX -->
  <div id="loginBox">
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="checkPassword()">Login</button>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel">
    <input type="number" id="prev" placeholder="Previous Reading">
    <input type="number" id="curr" placeholder="Current Reading">
    <button onclick="updateBill()">Update Bill</button>
  </div>

  <!-- RESULT -->
  <div class="row"><span>Units</span><span id="units">0</span></div>
  <div class="total">₹ <span id="total">0</span></div>

</div>

<script>
const PASSWORD = "1234";

const firebaseConfig = {
  apiKey: "AIzaSyC-QCBrGFrGI7FPrmZjocmf4Mzu92TgiEs",
  authDomain: "room-electricity.firebaseapp.com",
  databaseURL: "https://room-electricity-default-rtdb.firebaseio.com",
  projectId: "room-electricity"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// OPEN LOGIN
function openLogin(){
  document.getElementById("loginBox").style.display = "block";
}

// CHECK PASSWORD
function checkPassword(){
  let pass = document.getElementById("password").value;

  if(pass === PASSWORD){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
  } else {
    alert("Wrong Password ❌");
  }
}

// CALCULATE
function calculate(units){
  let energy=0,u=units;

  let s1=Math.min(u,100);energy+=s1*3.35;u-=s1;
  if(u>0){let s2=Math.min(u,100);energy+=s2*4.25;u-=s2;}
  if(u>0){let s3=Math.min(u,100);energy+=s3*5.35;u-=s3;}
  if(u>0){let s4=Math.min(u,100);energy+=s4*7.2;u-=s4;}
  if(u>0){let s5=Math.min(u,100);energy+=s5*8.5;u-=s5;}

  return energy;
}

// FIXED
function fixed(units){
  if(units<=100)return 100;
  if(units<=200)return 170;
  if(units<=300)return 210;
  if(units<=400)return 280;
  if(units<=500)return 320;
  return 440;
}

// UPDATE
function updateBill(){
  let prev=parseFloat(document.getElementById("prev").value)||0;
  let curr=parseFloat(document.getElementById("curr").value)||0;

  let units=curr-prev;
  if(units<0) units=0;

  let energy=calculate(units);
  let total=energy+fixed(units)+(energy*0.1)+12;

  db.ref("bill").set({
    units: units,
    total: total
  });

  alert("Updated ✅");
}

// DISPLAY
db.ref("bill").on("value", function(snapshot){
  let data=snapshot.val();
  if(data){
    document.getElementById("units").innerText=data.units;
    document.getElementById("total").innerText=data.total.toFixed(2);
  }
});
</script>

</body>
</html>
